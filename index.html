<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RZN | Подключение</title>
    <style>
        :root { --primary: #0088cc; --happ: #ff4500; --bg: #000000; --card: #111111; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg); 
            color: white; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
        }
        .container { 
            text-align: center; 
            background: var(--card); 
            padding: 40px 25px; 
            border-radius: 35px; 
            box-shadow: 0 15px 50px rgba(0, 136, 204, 0.2);
            max-width: 400px;
            width: 90%;
            border: 1px solid #222;
        }
        .logo { 
            width: 140px; 
            height: 140px; 
            margin-bottom: 20px; 
            border-radius: 30px; 
            object-fit: cover;
            box-shadow: 0 10px 30px rgba(0, 136, 204, 0.4);
        }
        h1 { font-size: 24px; margin: 10px 0; font-weight: 800; text-transform: uppercase; }
        p { color: #888; font-size: 14px; margin-bottom: 30px; line-height: 1.5; }
        
        .btn { 
            display: flex;
            align-items: center;
            justify-content: center;
            color: white; 
            padding: 18px; 
            border-radius: 16px; 
            text-decoration: none; 
            font-weight: 700; 
            font-size: 15px;
            transition: all 0.2s ease;
            text-transform: uppercase;
            margin-bottom: 12px;
            border: none;
            width: 100%;
            box-sizing: border-box;
        }
        .btn-v2ray { background: var(--primary); }
        .btn-happ { background: var(--happ); } /* Оранжевый стиль для HAPP */
        .btn:active { transform: scale(0.97); opacity: 0.8; }

        .store-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #222;
            display: none;
        }
        .store-title { font-size: 12px; color: #555; margin-bottom: 15px; text-transform: uppercase; }
        .store-links { display: flex; justify-content: space-around; gap: 10px; }
        .store-btn {
            background: #1a1a1a;
            color: #ccc;
            padding: 12px 10px;
            border-radius: 12px;
            font-size: 11px;
            text-decoration: none;
            flex: 1;
            border: 1px solid #333;
            font-weight: 600;
        }
        .retry-btn {
            margin-top: 20px;
            color: var(--primary);
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            display: block;
            opacity: 0.6;
        }
        .footer { font-size: 12px; color: #444; margin-top: 30px; }
    </style>
</head>
<body>

<div class="container">
    <img src="logo.png" alt="RZN" class="logo" onerror="this.src='https://via.placeholder.com/140/0088cc/ffffff?text=RZN'">
    <h1>ПОДКЛЮЧЕНИЕ</h1>
    <p id="main-desc">Выберите ваше приложение для автоматической настройки доступа</p>
    
    <a id="v2Btn" href="#" class="btn btn-v2ray">🚀 Добавить в V2RayTun</a>
    <a id="happBtn" href="#" class="btn btn-happ">📱 Добавить в HAPP Proxy</a>

    <div id="storeSection" class="store-section">
        <div class="store-title">Если приложение не установлено:</div>
        <div class="store-links" id="storeLinks"></div>
        <span class="retry-btn" onclick="location.reload()">↺ Попробовать снова</span>
    </div>

    <div class="footer">Поддержка: <b>@sasha_big_boss</b></div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const sub = params.get('sub');

    if (sub) {
        // Установка протоколов для импорта
        document.getElementById('v2Btn').href = "v2raytun://import/" + sub;
        document.getElementById('happBtn').href = "happ://add/" + sub; 
    } else {
        document.getElementById('main-desc').innerText = "Ошибка: данные не получены";
        document.getElementById('v2Btn').style.display = 'none';
        document.getElementById('happBtn').style.display = 'none';
    }

    // Детектор ОС и ссылки на маркеты
    const userAgent = navigator.userAgent || navigator.vendor || window.opera;
    const storeSection = document.getElementById('storeSection');
    const storeLinks = document.getElementById('storeLinks');

    // Показываем ссылки на установку через 2 секунды
    setTimeout(() => { storeSection.style.display = 'block'; }, 2000);

    if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
        // Ссылки для iOS
        storeLinks.innerHTML = `
            <a href="https://apps.apple.com/ru/app/v2raytun/id6470773935" class="store-btn" target="_blank">App Store (V2)</a>
            <a href="https://apps.apple.com/ru/app/happ-proxy/id6474143422" class="store-btn" target="_blank">App Store (HAPP)</a>
        `;
    } else {
        // Ссылки для Android (HAPP обычно ставится через APK или Play Store, если доступен)
        storeLinks.innerHTML = `
            <a href="https://play.google.com/store/apps/details?id=com.v2raytun.android" class="store-btn" target="_blank">Google Play (V2)</a>
            <a href="https://play.google.com/store/apps/details?id=com.happ.proxy" class="store-btn" target="_blank">Google Play (HAPP)</a>
        `;
    }
</script>

</body>
</html>

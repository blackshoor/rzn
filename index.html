<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RZN | Connect</title>
    <style>
        body { background-color: #0a0a0a; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; text-align: center; }
        .logo-box { width: 140px; height: 140px; margin-bottom: 20px; border-radius: 30px; border: 1px solid rgba(212, 175, 55, 0.3); overflow: hidden; }
        .logo-box img { width: 100%; height: auto; }
        h1 { background: linear-gradient(90deg, #d4af37, #f2d06b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; letter-spacing: 2px; }
        .btn-container { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 300px; margin-top: 20px; }
        .btn { display: block; padding: 18px 0; text-decoration: none; border-radius: 12px; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .btn-tun { background: linear-gradient(45deg, #d4af37, #f2d06b); color: #000; }
        .btn-happ { background: #fff; color: #000; }
        .btn:active { transform: scale(0.95); }
        #error-msg { color: #ff4444; font-size: 12px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="logo-box"><img src="logo.png" alt="RZN"></div>
    <h1>RZN Digital</h1>
    <p id="status-text">Загрузка конфигурации...</p>

    <div class="btn-container">
        <a href="#" id="tun-link" class="btn btn-tun">🍏 Импорт в v2rayTun</a>
        <a href="#" id="happ-link" class="btn btn-happ">⚡ Импорт в HAPP</a>
    </div>
    
    <p id="error-msg">Ошибка: Ключ не найден. Перейдите в бот для получения доступа.</p>

    <script>
        // Функция для получения ключа из URL
        function getConfig() {
            const urlParams = new URLSearchParams(window.location.search);
            const key = urlParams.get('key'); // Ищем параметр ?key=

            if (key) {
                // Подставляем ключ в кнопки
                document.getElementById('tun-link').href = "v2raytun://import/" + key;
                document.getElementById('happ-link').href = "happ://add/" + key;
                document.getElementById('status-text').innerText = "Конфигурация готова к импорту";
            } else {
                // Если ключа нет в ссылке
                document.getElementById('status-text').style.display = 'none';
                document.getElementById('error-msg').style.display = 'block';
                document.querySelectorAll('.btn').forEach(b => b.style.opacity = '0.3');
            }
        }
        window.onload = getConfig;
    </script>
</body>
</html>

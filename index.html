<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RZN | Подключение</title>
    <style>
        :root { --primary: #0088cc; --bg: #0a0a0a; --card: #141414; }
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg); 
            color: white; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh;
        }
        .container { 
            text-align: center; 
            background: var(--card); 
            padding: 40px 30px; 
            border-radius: 24px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-width: 350px;
            width: 90%;
            border: 1px solid #222;
        }
        .logo { width: 80px; height: 80px; margin-bottom: 20px; border-radius: 20px; }
        h1 { font-size: 24px; margin: 10px 0; letter-spacing: 1px; }
        p { color: #888; font-size: 14px; line-height: 1.5; }
        
        .btn { 
            display: block; 
            background: var(--primary); 
            color: white; 
            padding: 16px; 
            margin-top: 30px; 
            border-radius: 12px; 
            text-decoration: none; 
            font-weight: bold; 
            transition: transform 0.2s, background 0.2s;
        }
        .btn:active { transform: scale(0.95); background: #0077b5; }

        .loader {
            width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            display: inline-block;
            animation: spin 1s linear infinite;
            margin-top: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .steps { margin-top: 30px; text-align: left; font-size: 13px; color: #666; }
        .steps b { color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <img src="logo.png" alt="RZN" class="logo" onerror="this.style.display='none'">
    <h1>RZN SERVICE</h1>
    <p>Настраиваем безопасный доступ...</p>
    
    <div class="loader" id="loader"></div>

    <a id="connectBtn" href="#" class="btn">🚀 ПОДКЛЮЧИТЬ СЕЙЧАС</a>

    <div class="steps">
        <div>1. Убедитесь, что <b>V2RayTun</b> установлен.</div>
        <div>2. Нажмите синюю кнопку выше.</div>
        <div>3. В приложении выберите <b>RZN</b> и нажмите "Connect".</div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const subUrl = urlParams.get('sub');
    const key = urlParams.get('key');

    // Формируем ссылку для импорта
    let finalLink = "";
    if (subUrl) {
        finalLink = "v2raytun://import/" + subUrl;
    } else if (key) {
        finalLink = key; // Если передали прямой vless://
    }

    if (finalLink) {
        const btn = document.getElementById('connectBtn');
        btn.href = finalLink;

        // Авто-переход через 1.5 секунды, чтобы юзер успел увидеть лого
        setTimeout(() => {
            window.location.href = finalLink;
            document.getElementById('loader').style.display = 'none';
        }, 1500);
    } else {
        document.querySelector('p').innerText = "Ошибка: Данные не найдены";
        document.getElementById('loader').style.display = 'none';
    }
</script>

</body>
</html>

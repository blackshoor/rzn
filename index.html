<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RZN | Подключение</title>
    <style>
        :root { --primary: #0088cc; --hiddify: #9a33ff; --bg: #000000; --card: #0d0d0d; }
        body { 
            font-family: 'Segoe UI', -apple-system, sans-serif; 
            background-color: var(--bg); 
            color: white; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
        }
        .container { 
            text-align: center; 
            background: var(--card); 
            padding: 50px 30px; 
            border-radius: 40px; 
            box-shadow: 0 0 80px rgba(0, 136, 204, 0.15);
            max-width: 400px;
            width: 90%;
            border: 1px solid #1a1a1a;
        }
        
        .logo { 
            width: 180px; 
            height: 180px; 
            margin-bottom: 25px; 
            border-radius: 40px; 
            object-fit: cover;
            box-shadow: 0 15px 45px rgba(0, 136, 204, 0.4);
            border: 1px solid #222;
        }

        h1 { font-size: 28px; margin: 10px 0; letter-spacing: 2px; font-weight: 900; text-transform: uppercase; }
        p { color: #888; font-size: 15px; margin-bottom: 35px; line-height: 1.4; }
        
        .btn { 
            display: block;
            color: white; 
            padding: 20px; 
            border-radius: 18px; 
            text-decoration: none; 
            font-weight: 800; 
            font-size: 16px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .btn-v2ray { background: var(--primary); }
        .btn-v2ray:hover { background: #0099ee; box-shadow: 0 0 20px rgba(0, 136, 204, 0.4); }

        .btn-hiddify { background: var(--hiddify); }
        .btn-hiddify:hover { background: #ab47ff; box-shadow: 0 0 20px rgba(154, 51, 255, 0.4); }

        .btn:active { transform: scale(0.95); }

        .footer-text { font-size: 13px; color: #444; margin-top: 25px; border-top: 1px solid #1a1a1a; padding-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <img src="logo.png" alt="RZN" class="logo" onerror="this.src='https://via.placeholder.com/180/000000/0088cc?text=RZN'">
    <h1>RZN SERVICE</h1>
    <p>Выберите приложение для автоматического импорта настроек</p>
    
    <a id="v2rayBtn" href="#" class="btn btn-v2ray">🚀 V2RayTun (В2РЕЙ)</a>
    <a id="hiddifyBtn" href="#" class="btn btn-hiddify">📱 Hiddify (ХАПП)</a>

    <div class="footer-text">
        Нужна помощь? <br> Пишите в поддержку: <b>@sasha_big_boss</b>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const subUrl = urlParams.get('sub');

    if (subUrl) {
        // Формируем ссылки для обоих приложений
        document.getElementById('v2rayBtn').href = "v2raytun://import/" + subUrl;
        document.getElementById('hiddifyBtn').href = "hiddify://import/" + subUrl;
    } else {
        document.querySelector('p').innerText = "Ошибка: Ссылка на подписку не найдена. Перейдите из бота.";
        document.getElementById('v2rayBtn').style.display = 'none';
        document.getElementById('hiddifyBtn').style.display = 'none';
    }
</script>

</body>
</html>

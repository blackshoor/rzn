<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RZN | Подключение</title>
    <style>
        :root { --primary: #0088cc; --hiddify: #9a33ff; --bg: #000000; --card: #0d0d0d; }
        body { 
            font-family: 'Segoe UI', -apple-system, sans-serif; 
            background-color: var(--bg); 
            color: white; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
        }
        .container { 
            text-align: center; 
            background: var(--card); 
            padding: 50px 30px; 
            border-radius: 40px; 
            box-shadow: 0 0 80px rgba(0, 136, 204, 0.1);
            max-width: 400px;
            width: 90%;
            border: 1px solid #1a1a1a;
        }
        
        .logo { 
            width: 180px; 
            height: 180px; 
            margin-bottom: 25px; 
            border-radius: 40px; 
            object-fit: cover;
            box-shadow: 0 15px 45px rgba(0, 136, 204, 0.3);
        }

        h1 { font-size: 28px; margin: 10px 0; letter-spacing: 2px; font-weight: 900; }
        p { color: #888; font-size: 15px; margin-bottom: 30px; }
        
        .btn { 
            display: flex;
            align-items: center;
            justify-content: center;
            color: white; 
            padding: 18px; 
            border-radius: 16px; 
            text-decoration: none; 
            font-weight: 800; 
            font-size: 16px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        /* Кнопка V2RayTun */
        .btn-v2ray { background: var(--primary); }
        .btn-v2ray:active { transform: scale(0.95); background: #0077b5; }

        /* Кнопка Hiddify (HAPP) */
        .btn-hiddify { background: var(--hiddify); }
        .btn-hiddify:active { transform: scale(0.95); background: #7a28cc; }

        .loader {
            width: 24px; height: 24px;
            border: 3px solid rgba(255,255,255,0.05);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            display: inline-block;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .footer-text { font-size: 12px; color: #444; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <img src="logo.png" alt="RZN" class="logo" onerror="this.src='https://via.placeholder.com/180/000000/0088cc?text=RZN'">
    <h1>RZN SERVICE</h1>
    <p>Выберите приложение для импорта</p>
    
    <div class="loader" id="loader"></div>

    <a id="v2rayBtn" href="#" class="btn btn-v2ray">🚀 В2РЕЙ ТЮН (V2RayTun)</a>

    <a id="hiddifyBtn" href="#" class="btn btn-hiddify">📱 ХАПП (Hiddify)</a>

    <div class="footer-text">Нажмите на кнопку вашего приложения</div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const subUrl = urlParams.get('sub');

    if (subUrl) {
        // Ссылка для V2RayTun
        const v2rayLink = "v2raytun://import/" + subUrl;
        document.getElementById('v2rayBtn').href = v2rayLink;

        // Ссылка для Hiddify (HAPP) - используем hiddify:// протокол
        const hiddifyLink = "hiddify://import/" + subUrl;
        document.getElementById('hiddifyBtn').href = hiddifyLink;

        // Авто-попытка открыть в V2RayTun через 2 секунды (можно убрать, если хочешь только кнопки)
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
        }, 2000);
    } else {
        document.querySelector('p').innerText = "Ошибка: данные не получены";
        document.getElementById('loader').style.display = 'none';
    }
</script>

</body>
</html>

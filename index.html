<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RZN | Личный ИТ-сервис</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }

        .logo-box {
            width: 140px;
            height: 140px;
            margin-bottom: 20px;
            background: linear-gradient(145deg, #141414, #050505);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .logo-box img {
            width: 100%;
            height: auto;
            border-radius: 25px;
        }

        h1 {
            font-size: 24px;
            letter-spacing: 1.5px;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            background: linear-gradient(90deg, #d4af37, #f2d06b, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 14px;
            color: #888;
            max-width: 300px;
            margin-bottom: 25px;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 300px;
        }

        .btn {
            display: block;
            padding: 18px 0;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        /* Кнопка v2rayTun */
        .btn-tun {
            background: linear-gradient(45deg, #d4af37, #f2d06b);
            color: #000;
        }

        /* Кнопка HAPP */
        .btn-happ {
            background: #ffffff;
            color: #000;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .footer {
            margin-top: 40px;
            font-size: 11px;
            color: #444;
        }

        .footer a {
            color: #666;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="logo-box">
        <img src="logo.png" alt="RZN">
    </div>

    <h1>RZN Digital</h1>
    <p>Выберите приложение для автоматической настройки доступа</p>

    <div class="btn-container">
        <a href="v2raytun://import/ВАШ_VLESS_КЛЮЧ" class="btn btn-tun">
            🍏 Импорт в v2rayTun
        </a>

        <a href="happ://add/ВАШ_VLESS_КЛЮЧ" class="btn btn-happ">
            ⚡ Импорт в HAPP
        </a>
    </div>

    <div class="footer">
        © 2026 RZN Personal IT Service<br>
        <a href="oferta.html">Условия и Оферта</a>
    </div>

</body>
</html>

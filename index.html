<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RZN IT SERVICE - Настройка</title>
    <style>
        :root { --primary: #007AFF; --success: #34C759; --bg: #000000; --card: #1C1C1E; --text: #FFFFFF; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box;
            position: relative;
            overflow-x: hidden;
        }

        /* Логотип на фоне всей страницы */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('logo.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: 60%; /* Размер логотипа на фоне */
            opacity: 0.1; /* Прозрачность фона */
            z-index: -1;
        }

        .container { 
            background: rgba(28, 28, 30, 0.9); /* Полупрозрачная карточка */
            padding: 30px; 
            border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            width: 100%; 
            max-width: 400px; 
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .btn { display: block; color: white; text-decoration: none; padding: 16px; border-radius: 14px; font-weight: 600; margin-bottom: 12px; transition: transform 0.2s; border: none; cursor: pointer; width: 100%; font-size: 16px; }
        .btn-v2 { background: var(--primary); }
        .btn-happ { background: var(--success); }
        .btn:active { transform: scale(0.98); }
        
        .apps { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .app-link { background: #2C2C2E; color: #fff; text-decoration: none; padding: 12px; border-radius: 12px; font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .section-title { font-size: 12px; color: #8E8E93; margin: 20px 0 10px; text-transform: uppercase; letter-spacing: 1px; }
        .warning { background: rgba(255, 59, 48, 0.1); color: #FF3B30; padding: 12px; border-radius: 12px; font-size: 11px; margin-top: 20px; border: 1px solid rgba(255, 59, 48, 0.2); text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h1>RZN IT SERVICE</h1>
    <p>Выберите приложение для автоматической настройки</p>

    <button id="v2Btn" class="btn btn-v2">🚀 ПОДКЛЮЧИТЬ (V2RayTun)</button>
    <button id="happBtn" class="btn btn-happ">⚡ ПОДКЛЮЧИТЬ (Happ Proxy)</button>

    <div class="section-title">Android</div>
    <div class="apps">
        <a href="https://play.google.com/store/apps/details?id=com.v2raytun.android" class="app-link" target="_blank">V2RayTun</a>
        <a href="https://play.google.com/store/apps/details?id=com.happproxy" class="app-link" target="_blank">Happ Proxy</a>
    </div>

    <div class="section-title">iOS</div>
    <div class="apps">
        <a href="https://apps.apple.com/au/app/v2raytun/id6476628951" class="app-link" target="_blank">V2RayTun</a>
        <a href="https://apps.apple.com/au/app/happ-proxy-utility/id6504287215" class="app-link" target="_blank">Happ Proxy</a>
    </div>

    <div class="warning">
        ⚠️ <b>iOS:</b> Если ссылки не открываются, используйте зарубежный Apple ID.
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const subUrl = urlParams.get('sub');
    
    function setup(id, link) {
        document.getElementById(id).onclick = () => {
            if (!subUrl) return alert('Откройте страницу из бота!');
            window.location.href = link;
        };
    }

    setup('v2Btn', `v2raytun://import/${subUrl}`);
    setup('happBtn', `hiddify://install-config?url=${encodeURIComponent(subUrl)}`);
</script>

</body>
</html>
